<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Tests</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f6fb; display: flex; min-height: 100vh; }

.sidebar { width: 260px; background: #0f172a; color: white; height: 100vh; padding: 24px 16px; position: fixed; left: 0; top: 0; display: flex; flex-direction: column; overflow-y: auto; }
.logo { font-size: 22px; font-weight: 700; padding: 0 10px; margin-bottom: 4px; }
.portal-label { font-size: 11px; color: #64748b; padding: 0 10px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 16px; }
.staff-card { background: #1e293b; border-radius: 12px; padding: 12px 14px; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
.staff-avatar { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #8b5cf6); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; flex-shrink: 0; }
.staff-info .staff-name { font-size: 14px; font-weight: 600; color: white; }
.staff-info .staff-sub { font-size: 12px; color: #94a3b8; margin-top: 2px; }
.school-tag { background: #1e293b; border-radius: 10px; padding: 9px 14px; display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
.school-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
.school-tag-name { font-size: 13px; color: #cbd5e1; font-weight: 500; }
.menu { flex: 1; }
.menu a { display: flex; align-items: center; gap: 10px; padding: 11px 14px; margin-bottom: 4px; color: #94a3b8; text-decoration: none; border-radius: 10px; font-size: 14px; font-weight: 500; transition: 0.2s; }
.menu a:hover { background: #1e293b; color: white; }
.menu a.active { background: #2563eb; color: white; }
.logout { padding: 11px 14px; color: #ef4444; cursor: pointer; border-radius: 10px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 10px; margin-top: 8px; transition: 0.2s; }
.logout:hover { background: #1e293b; }

.main { margin-left: 260px; padding: 40px; flex: 1; }
.page-header { margin-bottom: 30px; }
.page-header h1 { font-size: 26px; font-weight: 700; color: #0f172a; }
.page-header p { color: #64748b; font-size: 14px; margin-top: 4px; }

.card { background: white; border-radius: 16px; padding: 28px; box-shadow: 0 2px 16px rgba(0,0,0,0.06); margin-bottom: 20px; max-width: 900px; }
.card-title { font-size: 16px; font-weight: 700; color: #0f172a; margin-bottom: 20px; }

.top-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 14px; margin-bottom: 16px; }
.field { display: flex; flex-direction: column; gap: 6px; }
label { font-size: 13px; font-weight: 600; color: #374151; }
input, select { padding: 11px 14px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 14px; font-family: inherit; background: #f8fafc; color: #0f172a; outline: none; transition: 0.2s; width: 100%; }
input:focus, select:focus { border-color: #2563eb; background: white; }
input[readonly] { background: #f1f5f9; color: #475569; cursor: default; }

/* Question card */
.question-card { background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 12px; padding: 20px; margin-bottom: 16px; position: relative; }
.question-card h4 { font-size: 14px; font-weight: 700; color: #2563eb; margin-bottom: 14px; }
.q-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.correct-label { color: #16a34a; font-weight: 700; }

.add-btn { padding: 11px 20px; background: #f0fdf4; color: #16a34a; border: 1.5px solid #bbf7d0; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; transition: 0.2s; margin-right: 12px; }
.add-btn:hover { background: #dcfce7; }

.create-btn { padding: 13px 28px; background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; box-shadow: 0 4px 12px rgba(37,99,235,0.3); transition: 0.2s; }
.create-btn:hover { transform: translateY(-1px); }

.remove-btn { position: absolute; top: 14px; right: 14px; background: #fee2e2; color: #ef4444; border: none; border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 12px; font-weight: 600; }

.toast { display: none; position: fixed; top: 24px; right: 24px; background: #16a34a; color: white; padding: 14px 20px; border-radius: 12px; font-size: 14px; font-weight: 600; box-shadow: 0 8px 24px rgba(0,0,0,0.15); z-index: 1000; animation: slideIn 0.3s ease; }
@keyframes slideIn { from { transform: translateX(60px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">RTLMS</div>
  <div class="portal-label">Staff Portal</div>
  <div class="staff-card">
    <div class="staff-avatar" id="avatarLetter">S</div>
    <div class="staff-info">
      <div class="staff-name" id="staffNameDisplay">Staff</div>
      <div class="staff-sub" id="staffIdDisplay">ID: -</div>
    </div>
  </div>
  <div class="school-tag">
    <div class="school-dot"></div>
    <div class="school-tag-name" id="schoolTagName">Loading...</div>
  </div>
  <div class="menu">
    <a href="staff-dashboard.html">🏠 Dashboard</a>
    <a href="submit-reports.html">📋 Submit Reports</a>
    <a href="session-hours.html">⏱ Session Hours</a>
    <a href="upload-lectures.html">🎬 Upload Lectures</a>
    <a href="upload-books.html">📚 Upload Books</a>
    <a class="active" href="create-tests.html">📝 Create Tests</a>
    <a href="staff-class-gallery.html">📷 Class Gallery</a>
    <a href="staff-profile.html">👤 My Profile</a>
  </div>
  <div class="logout" onclick="logout()">🚪 Logout</div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="page-header">
    <h1>Create Tests</h1>
    <p>Create online tests with multiple choice questions for students</p>
  </div>

  <!-- Test Info -->
  <div class="card">
    <div class="card-title">📝 Test Details</div>
    <div class="top-row">
      <div class="field">
        <label>School</label>
        <input id="schoolNameInput" >
        <input type="hidden" id="school_id_hidden">
      </div>
      <div class="field">
        <label>Class</label>
        <select id="class_name">
          <option value="">Loading Classes...</option>
        </select>
      </div>
      <div class="field">
        <label>Subject</label>
        <input id="subject" placeholder="e.g. Mathematics">
      </div>
      <div class="field">
        <label>Duration (minutes)</label>
        <input type="number" id="duration" value="30" min="5">
      </div>
    </div>
    <div class="field" style="max-width:500px;">
      <label>Test Title</label>
      <input id="title" placeholder="e.g. Unit 1 Assessment">
    </div>
  </div>

  <!-- Questions -->
  <div id="questionsContainer"></div>

  <!-- Buttons -->
  <div style="max-width:900px;">
    <button class="add-btn" onclick="addQuestion()">+ Add Question</button>
    <button class="create-btn" onclick="createTest()">Create Test →</button>
  </div>
</div>

<div class="toast" id="toast">✅ Test created successfully!</div>

<script>
let questionCount = 0;

window.onload = () => {
  let school_id   = localStorage.getItem("school_id");
  let school_name = localStorage.getItem("school_name");
  let staff_id    = localStorage.getItem("staff_id");

  if (!school_id) { alert("Login expired ❌"); window.location.href = "/"; return; }

  let name = school_name || "School";
  document.getElementById("schoolNameInput").value  = name;
  document.getElementById("school_id_hidden").value = school_id;
  document.getElementById("avatarLetter").innerText     = name.charAt(0).toUpperCase();
  document.getElementById("staffNameDisplay").innerText = name;
  document.getElementById("staffIdDisplay").innerText   = "Staff ID : " + (staff_id || "-");
  document.getElementById("schoolTagName").innerText    = name;

  addQuestion(); // default 1 question
  loadClasses();
}

function addQuestion() {
  questionCount++;
  let qId = questionCount;

  let div = document.createElement("div");
  div.className = "card";
  div.id = "q_" + qId;
  div.style.maxWidth = "900px";

  div.innerHTML = `
    <div class="question-card">
      <h4>Q${qId}</h4>
      <button class="remove-btn" onclick="removeQuestion(${qId})">✕ Remove</button>

      <div class="field" style="margin-bottom:14px;">
        <label>Question</label>
        <input id="question_${qId}" placeholder="Enter your question here">
      </div>

      <div class="q-grid">
        <div class="field">
          <label class="correct-label">Option A ✓ (Correct)</label>
          <input id="optA_${qId}" placeholder="Option A">
        </div>
        <div class="field">
          <label>Option B</label>
          <input id="optB_${qId}" placeholder="Option B">
        </div>
        <div class="field">
          <label>Option C</label>
          <input id="optC_${qId}" placeholder="Option C">
        </div>
        <div class="field">
          <label>Option D</label>
          <input id="optD_${qId}" placeholder="Option D">
        </div>
      </div>

      <div class="field" style="max-width:300px;">
        <label>Correct Answer</label>
        <select id="correct_${qId}">
          <option value="A">Option A</option>
          <option value="B">Option B</option>
          <option value="C">Option C</option>
          <option value="D">Option D</option>
        </select>
      </div>
    </div>`;

  document.getElementById("questionsContainer").appendChild(div);
}

function removeQuestion(qId) {
  let el = document.getElementById("q_" + qId);
  if (el) el.remove();
}

async function createTest() {
  let school_id  = document.getElementById("school_id_hidden").value;
  let staff_id   = localStorage.getItem("staff_id");
  let class_name = document.getElementById("class_name").value;
  let subject    = document.getElementById("subject").value.trim();
  let title      = document.getElementById("title").value.trim();
  let duration   = document.getElementById("duration").value;

  if (!class_name) { alert("Class select பண்ணுங்க ❌"); return; }
  if (!subject)    { alert("Subject enter பண்ணுங்க ❌"); return; }
  if (!title)      { alert("Test Title enter பண்ணுங்க ❌"); return; }

  let questions = [];

  for (let i = 1; i <= questionCount; i++) {
    let qEl = document.getElementById("q_" + i);
    if (!qEl) continue;

    let q = document.getElementById("question_" + i)?.value.trim();
    let a = document.getElementById("optA_" + i)?.value.trim();
    let b = document.getElementById("optB_" + i)?.value.trim();
    let c = document.getElementById("optC_" + i)?.value.trim();
    let d = document.getElementById("optD_" + i)?.value.trim();
    let correct = document.getElementById("correct_" + i)?.value;

    if (!q || !a || !b) { alert(`Q${i} — Question and options fill பண்ணுங்க ❌`); return; }

    questions.push({ question: q, option_a: a, option_b: b, option_c: c, option_d: d, correct_answer: correct });
  }

  if (questions.length === 0) { alert("Minimum 1 question add பண்ணுங்க "); return; }

  try {
    let res = await fetch("https://school-lms-production-6fcd.up.railway.app/create-test", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ school_id, staff_id, class_name, subject, title, duration, questions })
    });

    let data = await res.json();

    if (res.status === 200) {
      document.getElementById("toast").style.display = "block";
      setTimeout(() => { document.getElementById("toast").style.display = "none"; }, 3000);
      document.getElementById("questionsContainer").innerHTML = "";
      questionCount = 0;
      addQuestion();
    } else {
      alert("Failed ");
    }
  } catch(err) {
    alert("Server error ");
  }
}

function logout() { localStorage.clear(); window.location.href = "/"; }
async function loadClasses() {

  try {

    let school_id =
    localStorage.getItem("school_id");

    let response = await fetch(
    `https://school-lms-production-6fcd.up.railway.app/get-classes?school_id=${school_id}`
    );

    let data = await response.json();

    console.log(data);

    let classSelect =
    document.getElementById("class_name");

    classSelect.innerHTML =
    `<option value="">Select Class</option>`;

    if (!data.classes || data.classes.length === 0) {

      classSelect.innerHTML +=
      `<option>No Classes Found</option>`;

      return;
    }

    data.classes.forEach(cls => {

      classSelect.innerHTML += `
      <option value="${cls}">
        ${cls}
      </option>
      `;
    });

  }

  catch(error){

    console.log(error);

    alert("Failed to load classes");
  }
}

</script>
</body>
</html>
