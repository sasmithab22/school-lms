<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  display: flex;
  background: #f4f6fb;
  min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: #0f172a;
  color: white;
  height: 100vh;
  padding: 24px 16px;
  display: flex;
  flex-direction: column;
  position: fixed;
  left: 0; top: 0;
  overflow-y: auto;
}

.logo { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.portal-label { font-size: 11px; color: #64748b; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 16px; }

.profile {
  background: #1e293b;
  padding: 14px;
  border-radius: 12px;
  margin-bottom: 20px;
}
.profile-name { font-weight: 700; font-size: 15px; color: white; }
.profile-sub  { font-size: 12px; color: #94a3b8; margin-top: 3px; }

.menu { flex: 1; }
.menu a {
  display: flex;
  align-items: center;
  gap: 10px;
  color: #94a3b8;
  text-decoration: none;
  padding: 11px 14px;
  border-radius: 10px;
  margin-bottom: 4px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: 0.2s;
}
.menu a:hover { background: #1e293b; color: white; }
.menu a.active { background: #2563eb; color: white; }

.logout {
  padding: 11px 14px;
  color: #ef4444;
  cursor: pointer;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 8px;
  transition: 0.2s;
}
.logout:hover { background: #1e293b; }

/* MAIN */
.main { margin-left: 260px; padding: 40px; flex: 1; }

.welcome-text { font-size: 26px; font-weight: 700; color: #0f172a; margin-bottom: 6px; }
.welcome-sub  { color: #64748b; font-size: 14px; margin-bottom: 30px; }

/* STAT CARDS — 4 columns */
.cards {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 30px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 14px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.08); }

.card-icon {
  width: 50px; height: 50px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}

.card-icon.blue   { background: #eff6ff; }
.card-icon.green  { background: #f0fdf4; }
.card-icon.yellow { background: #fef3c7; }
.card-icon.purple { background: #faf5ff; }

.card-info h2 { font-size: 26px; font-weight: 700; color: #0f172a; }
.card-info p  { font-size: 12px; color: #64748b; margin-top: 2px; }

/* VIDEO SECTION */
.section-card {
  background: white;
  border-radius: 14px;
  padding: 24px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
}

.section-title {
  font-size: 17px;
  font-weight: 700;
  color: #0f172a;
  margin-bottom: 16px;
}

.video-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 12px;
  border-bottom: 1px solid #f0f0f0;
  gap: 12px;
}

.video-item:last-child { border-bottom: none; }

.video-info strong { font-size: 15px; color: #0f172a; }
.video-info small  { font-size: 12px; color: #64748b; display: block; margin-top: 2px; }

.watch-btn {
  background: #2563eb;
  color: white;
  border: none;
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  white-space: nowrap;
  flex-shrink: 0;
}

.watch-btn:hover { background: #1d4ed8; }

.empty-msg { color: #94a3b8; text-align: center; padding: 30px; }
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <div class="logo">🎓 RTLMS</div>
  <div class="portal-label">Student Portal</div>

  <div class="profile">
    <div class="profile-name" id="name">Student</div>
    <div class="profile-sub"  id="info">Class -</div>
  </div>

  <div class="menu">
    <a class="active" id="menuDashboard" onclick="showDashboard()">🏠 My Dashboard</a>
    <a id="menuVideos" onclick="showVideos()">🎬 Video Lectures</a>
    <a href="library.html">📚 Library</a>
    <a href="student-gallery.html">🖼 Class Gallery</a>
    <a href="tests.html">📝 Take Tests</a>
    <a href="results.html">🏆 My Results</a>
  </div>

  <div class="logout" onclick="logout()">🚪 Logout</div>

</div>

<!-- MAIN -->
<div class="main">

  <div class="welcome-text" id="welcome">Welcome! 👋</div>
  <div class="welcome-sub"  id="welcomeSub">Loading...</div>

  <!-- DASHBOARD -->
  <div id="dashboard">

    <!-- ✅ 4 STAT CARDS -->
    <div class="cards">

      <div class="card" onclick="showVideos()">
        <div class="card-icon blue">🎬</div>
        <div class="card-info">
          <h2 id="lectureCount">0</h2>
          <p>Video Lectures</p>
        </div>
      </div>

      <div class="card" onclick="go('library.html')">
        <div class="card-icon green">📚</div>
        <div class="card-info">
          <h2 id="bookCount">0</h2>
          <p>Books Available</p>
        </div>
      </div>

      <div class="card" onclick="go('tests.html')">
        <div class="card-icon yellow">📝</div>
        <div class="card-info">
          <h2 id="testCount">0</h2>
          <p>Tests Available</p>
        </div>
      </div>

      <div class="card" onclick="go('results.html')">
        <div class="card-icon purple">🏆</div>
        <div class="card-info">
          <h2 id="resultCount">0</h2>
          <p>Test Results</p>
        </div>
      </div>

    </div>

  </div>

  <!-- VIDEOS SECTION -->
  <div id="videosSection" style="display:none;">
    <div class="section-card">
      <div class="section-title">🎬 Video Lectures</div>
      <div id="videos"><p class="empty-msg">Loading...</p></div>
    </div>
  </div>

</div>

<script>

// GET STUDENT DATA
let student = JSON.parse(localStorage.getItem("student"));

if (!student) {
  window.location.href = "login.html";
} else {

// PROFILE
let className = parseInt(student.class);
document.getElementById("name").innerText       = student.name;
document.getElementById("info").innerText       = "Class " + className + " • ID #" + student.student_id;
document.getElementById("welcome").innerText    = "Welcome, " + student.name + " 👋";
document.getElementById("welcomeSub").innerText = "Class " + className + " • " + (student.school_name || "School");

// ── LOAD VIDEOS ──
async function loadVideos() {
  try {
    let res  = await fetch(`http://127.0.0.1:8000/get-lectures?class_name=${student.class}&school_id=${student.school_id}`);
    let data = await res.json();
    document.getElementById("lectureCount").innerText = data.length;

    let container = document.getElementById("videos");
    container.innerHTML = "";

    if (data.length === 0) {
      container.innerHTML = `<p class="empty-msg">No videos uploaded yet</p>`;
      return;
    }

    data.forEach(v => {
      container.innerHTML += `
      <div class="video-item">
        <div class="video-info">
          <strong>${v.title}</strong>
          <small>${v.subject || "Lecture"}</small>
        </div>
        <button class="watch-btn" onclick="watch('http://127.0.0.1:8000/${v.video}')">▶ Watch</button>
      </div>`;
    });

  } catch(err) {
    document.getElementById("lectureCount").innerText = "0";
  }
}

// ── LOAD BOOKS COUNT ──
async function loadBooks() {
  try {
    let res  = await fetch(`http://127.0.0.1:8000/get-books?school_id=${student.school_id}&class_name=${student.class}`);
    let data = await res.json();
    document.getElementById("bookCount").innerText = data.length;
  } catch(err) {
    document.getElementById("bookCount").innerText = "0";
  }
}

// ── LOAD TESTS COUNT ✅ ──
async function loadTests() {
  try {
    let res  = await fetch(`http://127.0.0.1:8000/get-tests?school_id=${student.school_id}&class_name=${student.class}`);
    let data = await res.json();
    document.getElementById("testCount").innerText = data.length;
  } catch(err) {
    document.getElementById("testCount").innerText = "0";
  }
}

// ── LOAD RESULTS COUNT ✅ ──
async function loadResults() {
  try {
    let res  = await fetch(`http://127.0.0.1:8000/get-results?student_id=${student.student_id}&school_id=${student.school_id}`);
    let data = await res.json();
    document.getElementById("resultCount").innerText = data.length;
  } catch(err) {
    document.getElementById("resultCount").innerText = "0";
  }
}

// WATCH VIDEO
function watch(url) { window.open(url, "_blank"); }

// NAVIGATION
function go(page) { window.location.href = page; }

// SWITCH SECTIONS
function showDashboard() {
  document.getElementById("dashboard").style.display     = "block";
  document.getElementById("videosSection").style.display = "none";
  document.getElementById("menuDashboard").classList.add("active");
  document.getElementById("menuVideos").classList.remove("active");
}

function showVideos() {
  document.getElementById("dashboard").style.display     = "none";
  document.getElementById("videosSection").style.display = "block";
  document.getElementById("menuVideos").classList.add("active");
  document.getElementById("menuDashboard").classList.remove("active");
}

// LOGOUT
function logout() {
  localStorage.clear();
  window.location.href = "login.html";
}

// ── INIT ──
loadVideos();
loadBooks();
loadTests();
loadResults();

} // end else
</script>

</body>
</html>
