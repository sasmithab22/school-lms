<!DOCTYPE html>
<html>

<head>
<title>RTLMS Login</title>

<style>
body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
}

.left{
flex:1;
background:linear-gradient(120deg,#2f5ae5,#4a7dff);
color:white;
padding:80px;
}

.left h1{
font-size:60px;
margin-top:80px;
}

.right{
width:450px;
padding:60px;
background:white;
}

.roles button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:8px;
background:#eee;
cursor:pointer;
}

.roles button.active{
background:#2f5ae5;
color:white;
}

input{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
}

.login-btn{
width:100%;
padding:14px;
background:#2f5ae5;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="left">
<h2>RTLMS</h2>
<h1>Empowering<br>Education<br>Together</h1>
<p>A unified platform for schools, staff, and students</p>
</div>

<div class="right">

<h2>Welcome back</h2>
<p>Sign in to continue</p>

<div class="roles">
<button onclick="selectRole(this,'staff')">Staff</button>
<button onclick="selectRole(this,'school')">School</button>
<button onclick="selectRole(this,'student')" id="studentBtn">Student</button>
<button onclick="selectRole(this,'admin')">Admin</button>
</div>

<br>

<label id="label1"></label>
<input id="input1">

<label id="label2"></label>
<input id="input2">

<button class="login-btn" id="loginBtn" onclick="login()"></button>

</div>

<script>

let role="student"

// SWITCH ROLE
function selectRole(btn,r){

document.querySelectorAll(".roles button").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")

role=r

document.getElementById("input1").value=""
document.getElementById("input2").value=""

if(role=="student"){

document.getElementById("label1").innerText="Student ID"
document.getElementById("label2").innerText="School ID"

document.getElementById("input1").type="number"
document.getElementById("input2").type="number"

document.getElementById("loginBtn").innerText="Sign in as Student"

}else{

document.getElementById("label1").innerText="Username"
document.getElementById("label2").innerText="Password"

document.getElementById("input1").type="text"
document.getElementById("input2").type="password"

document.getElementById("loginBtn").innerText="Sign in as " + r

}

}

// AUTO LOAD
window.onload = () => {
selectRole(document.getElementById("studentBtn"), "student");
}

// LOGIN
async function login(){

let val1=document.getElementById("input1").value
let val2=document.getElementById("input2").value

if(val1=="" || val2==""){
alert("Please fill all fields")
return
}

localStorage.clear()

// STAFF
if(role=="staff"){

let url=`https://school-lms-production-6fcd.up.railway.app/staff-login?username=${val1}&password=${val2}`
let res=await fetch(url,{method:"POST"})
let data=await res.json()

if(data.message=="Login success"){
localStorage.setItem("staff_id",   data.staff_id)
localStorage.setItem("school_id",  data.school_id)
localStorage.setItem("school_name", data.school_name) // ✅ FIXED - school name save
window.location.href="staff-dashboard.html"
}else{
alert("Invalid login ❌")
}

}

// SCHOOL
else if(role=="school"){

let url=`https://school-lms-production-6fcd.up.railway.app/school-login?username=${val1}&password=${val2}`
let res=await fetch(url,{method:"POST"})
let data=await res.json()

if(res.status==200){
localStorage.setItem("school_id",   data.school_id || data.id)
localStorage.setItem("school_name", data.school_name || data.name)
window.location.href="school-dashboard.html"
}else{
alert("Invalid login ❌")
}

}

// ADMIN
else if(role=="admin"){

let url=`https://school-lms-production-6fcd.up.railway.app/admin-login?username=${val1}&password=${val2}`
let res=await fetch(url,{method:"POST"})
let data=await res.json()

if(res.status==200){
window.location.href="admin-dashboard.html"
}else{
alert("Invalid login ❌")
}

}

// STUDENT
else if(role=="student"){

const student_id = val1
const school_id  = val2

const formData = new FormData()
formData.append("student_id", student_id)
formData.append("school_id",  school_id)

const res  = await fetch("https://school-lms-production-6fcd.up.railway.app/student-login",{
method:"POST",
body:formData
})

const data = await res.json()

if(data.message==="Login success"){
localStorage.setItem("student", JSON.stringify(data))
window.location.href="student-dashboard.html"
}else{
alert(data.message)
}

}

}

</script>

</body>
</html>
