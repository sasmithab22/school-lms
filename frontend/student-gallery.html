<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Class Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f6fb; display: flex; min-height: 100vh; }
.sidebar { width: 260px; background: #0f172a; color: white; height: 100vh; padding: 24px 16px; position: fixed; left: 0; top: 0; display: flex; flex-direction: column; overflow-y: auto; }
.logo { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.portal-label { font-size: 11px; color: #64748b; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 16px; }
.profile { background: #1e293b; padding: 14px; border-radius: 12px; margin-bottom: 20px; }
.profile-name { font-weight: 700; font-size: 15px; color: white; }
.profile-sub  { font-size: 12px; color: #94a3b8; margin-top: 3px; }
.menu { flex: 1; }
.menu a { display: flex; align-items: center; gap: 10px; color: #94a3b8; text-decoration: none; padding: 11px 14px; border-radius: 10px; margin-bottom: 4px; font-size: 14px; font-weight: 500; cursor: pointer; transition: 0.2s; }
.menu a:hover { background: #1e293b; color: white; }
.menu a.active { background: #2563eb; color: white; }
.logout { padding: 11px 14px; color: #ef4444; cursor: pointer; border-radius: 10px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 10px; margin-top: 8px; transition: 0.2s; }
.logout:hover { background: #1e293b; }
.main { margin-left: 260px; padding: 40px; flex: 1; }
.page-header { margin-bottom: 30px; }
.page-header h1 { font-size: 26px; font-weight: 700; color: #0f172a; }
.page-header p { color: #64748b; font-size: 14px; margin-top: 4px; }
.filter-card { background: white; border-radius: 14px; padding: 20px 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.filter-card label { font-size: 13px; font-weight: 600; color: #374151; }
select { padding: 10px 14px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 14px; font-family: inherit; background: #f8fafc; color: #0f172a; outline: none; }
.load-btn { padding: 10px 22px; background: #2563eb; color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
.gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
.gallery-item { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.gallery-item img { width: 100%; height: 180px; object-fit: cover; display: block; }
.gallery-item a { display: block; padding: 10px 14px; color: #2563eb; font-size: 13px; font-weight: 600; text-decoration: none; border-top: 1px solid #f0f0f0; }
.empty-state { text-align: center; padding: 60px 20px; color: #94a3b8; grid-column: 1/-1; }
.empty-state div { font-size: 48px; margin-bottom: 16px; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">🎓 RTLMS</div>
  <div class="portal-label">Student Portal</div>
  <div class="profile">
    <div class="profile-name" id="studentName">Student</div>
    <div class="profile-sub"  id="studentInfo">Class -</div>
  </div>
  <div class="menu">
    <a href="student-dashboard.html">🏠 My Dashboard</a>
    <a href="student-dashboard.html">🎬 Video Lectures</a>
    <a href="library.html">📚 Library</a>
    <a class="active" href="student-gallery.html">🖼 Class Gallery</a>
    <a href="tests.html">📝 Take Tests</a>
    <a href="results.html">🏆 My Results</a>
  </div>
  <div class="logout" onclick="logout()">🚪 Logout</div>
</div>

<div class="main">
  <div class="page-header">
    <h1>🖼 Class Gallery</h1>
    <p>Class activity photos uploaded by your teachers</p>
  </div>
  <div class="filter-card">
    <label>Month</label>
    <select id="month">
      <option value="January">January</option>
      <option value="February">February</option>
      <option value="March">March</option>
      <option value="April">April</option>
      <option value="May">May</option>
      <option value="June">June</option>
      <option value="July">July</option>
      <option value="August">August</option>
      <option value="September">September</option>
      <option value="October">October</option>
      <option value="November">November</option>
      <option value="December">December</option>
    </select>
    <button class="load-btn" onclick="loadGallery()">Load Photos</button>
  </div>
  <div id="gallery" class="gallery">
    <div class="empty-state"><div>📷</div><p>Loading...</p></div>
  </div>
</div>

<script>

// ✅ student data எடு
var studentData = null;

try {
  var raw = localStorage.getItem("student");
  if (raw) {
    studentData = JSON.parse(raw);
  }
} catch(e) {
  console.log("parse error", e);
}

// ✅ data இல்லன்னா மட்டும் redirect
if (!studentData) {
  alert("Please login first!");
  window.location.href = "login.html";
} else {

  // ✅ Profile
  var cn = parseInt(studentData.class);
  document.getElementById("studentName").innerText = studentData.name;
  document.getElementById("studentInfo").innerText = "Class " + cn + " • ID #" + studentData.student_id;

  // ✅ Current month
  var months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  document.getElementById("month").value = months[new Date().getMonth()];

  // ✅ Load gallery
  loadGallery();

}

async function loadGallery() {

  var raw = localStorage.getItem("student");

  if (!raw) {
    alert("Login expired!");
    window.location.href = "login.html";
    return;
  }

  var s = JSON.parse(raw);

  var school_id  = s.school_id;
  var class_name = parseInt(s.class);
  var month      = document.getElementById("month").value;

  var gallery = document.getElementById("gallery");
  gallery.innerHTML = "<div class='empty-state'><div>⏳</div><p>Loading...</p></div>";

  try {

    var res  = await fetch("http://127.0.0.1:8000/get-gallery?school_id=" + school_id + "&class_name=" + class_name + "&month=" + month);
    var data = await res.json();

    var photos = Array.isArray(data) ? data : (data.photos || []);

    if (photos.length === 0) {
      gallery.innerHTML = "<div class='empty-state'><div>📷</div><p>No photos for " + month + " yet</p></div>";
      return;
    }

    gallery.innerHTML = "";
    photos.forEach(function(p) {
      gallery.innerHTML += "<div class='gallery-item'><img src='http://127.0.0.1:8000/uploads/" + p.image + "' alt='Class Photo'><a href='http://127.0.0.1:8000/uploads/" + p.image + "' download>⬇ Download</a></div>";
    });

  } catch(err) {
    console.log(err);
    gallery.innerHTML = "<div class='empty-state'><div>❌</div><p>Error loading photos</p></div>";
  }

}

function logout() {
  localStorage.clear();
  window.location.href = "login.html";
}

</script>
</body>
</html>
