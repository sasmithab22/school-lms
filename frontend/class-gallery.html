<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Class Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:#f4f6fb;
  display:flex;
  min-height:100vh;
}

/* SIDEBAR */

.sidebar{
  width:260px;
  background:#0f172a;
  color:white;
  height:100vh;
  position:fixed;
  left:0;
  top:0;
  padding:24px 16px;
  display:flex;
  flex-direction:column;
  overflow-y:auto;
}

.logo{
  font-size:22px;
  font-weight:700;
  margin-bottom:4px;
}

.portal-label{
  font-size:11px;
  color:#64748b;
  letter-spacing:1px;
  text-transform:uppercase;
  margin-bottom:20px;
}

.school-card{
  background:#1e293b;
  border-radius:14px;
  padding:14px;
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:14px;
}

.avatar{
  width:44px;
  height:44px;
  border-radius:50%;
  background:linear-gradient(135deg,#2563eb,#4f46e5);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  font-size:18px;
}

.school-info h3{
  font-size:15px;
  color:white;
}

.school-info p{
  font-size:12px;
  color:#94a3b8;
}

.school-tag{
  background:#1e293b;
  border-radius:10px;
  padding:10px 14px;
  margin-bottom:20px;
  display:flex;
  align-items:center;
  gap:10px;
}

.dot{
  width:8px;
  height:8px;
  background:#22c55e;
  border-radius:50%;
}

.menu{
  flex:1;
}

.menu a{
  display:flex;
  align-items:center;
  gap:10px;
  text-decoration:none;
  color:#cbd5e1;
  padding:12px 14px;
  border-radius:10px;
  margin-bottom:4px;
  transition:0.2s;
  font-size:15px;
}

.menu a:hover{
  background:#1e293b;
}

.menu a.active{
  background:#2563eb;
  color:white;
}

.logout{
  padding:12px 14px;
  border-radius:10px;
  cursor:pointer;
  color:#ef4444;
  transition:0.2s;
}

.logout:hover{
  background:#1e293b;
}

/* MAIN */

.main{
  margin-left:260px;
  flex:1;
  padding:40px;
}

.header{
  margin-bottom:30px;
}

.header h1{
  font-size:28px;
  color:#0f172a;
  margin-bottom:6px;
}

.header p{
  color:#64748b;
}

/* FILTER */

.filter-card{
  background:white;
  border-radius:18px;
  padding:30px;
  margin-bottom:30px;
  box-shadow:0 2px 16px rgba(0,0,0,0.05);
}

.filter-row{
  display:flex;
  gap:20px;
  align-items:end;
  flex-wrap:wrap;
}

.form-group{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.form-group label{
  font-weight:600;
  color:#0f172a;
}

select{
  width:180px;
  padding:14px;
  border-radius:12px;
  border:1px solid #dbe2ea;
  font-size:15px;
  font-family:inherit;
  background:white;
}

.load-btn{
  padding:14px 28px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  color:white;
  font-weight:600;
  cursor:pointer;
  font-size:15px;
  box-shadow:0 4px 14px rgba(37,99,235,0.25);
}

/* GALLERY */

.gallery-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:24px;
}

.file-card{
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 2px 14px rgba(0,0,0,0.05);
}

.preview{
  height:220px;
  background:#f8fafc;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.preview img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.preview video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.file-icon{
  font-size:70px;
}

.file-bottom{
  padding:18px;
  text-align:center;
}

.download-btn{
  text-decoration:none;
  color:#2563eb;
  font-weight:700;
  font-size:15px;
}

/* EMPTY */

.empty{
  background:white;
  border-radius:20px;
  padding:70px 20px;
  text-align:center;
  color:#94a3b8;
  box-shadow:0 2px 14px rgba(0,0,0,0.05);
}

.empty-icon{
  font-size:70px;
  margin-bottom:16px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

  <div class="logo">RTLMS</div>
  <div class="portal-label">School Portal</div>

  <div class="school-card">
    <div class="avatar" id="avatarLetter">S</div>

    <div class="school-info">
      <h3 id="schoolName">School</h3>
      <p>School Admin</p>
    </div>
  </div>

  <div class="school-tag">
    <div class="dot"></div>
    <span id="schoolTag">Loading...</span>
  </div>

  <div class="menu">

    <a href="school-dashboard.html">⚡ Overview</a>

    <a href="students.html">🎓 Students</a>

    <a href="upload-students.html">📤 Upload Students</a>

    <a href="class-reports.html">📊 Class Reports</a>

    <a class="active" href="class-gallery.html">📷 Class Gallery</a>

    <a href="session-attendance.html">⏱ Session Attendance</a>

    <a href="my-profile.html">👤 My Profile</a>

  </div>

  <div class="logout" onclick="logout()">
    🚪 Sign Out
  </div>

</div>

<!-- MAIN -->

<div class="main">

  <div class="header">
    <h1>📷 Class Gallery</h1>
    <p>View files uploaded by staff</p>
  </div>

  <!-- FILTER -->

  <div class="filter-card">

    <div class="filter-row">

      <div class="form-group">
        <label>Class</label>

        <select id="classSelect">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
          <option value="9">9</option>
          <option value="10">10</option>
        </select>
      </div>

      <div class="form-group">
        <label>Month</label>

        <select id="monthSelect">
          <option>January</option>
          <option>February</option>
          <option>March</option>
          <option>April</option>
          <option>May</option>
          <option>June</option>
          <option>July</option>
          <option>August</option>
          <option>September</option>
          <option>October</option>
          <option>November</option>
          <option>December</option>
        </select>
      </div>

      <button class="load-btn" onclick="loadGallery()">
        Load Gallery
      </button>

    </div>

  </div>

  <!-- GALLERY -->

  <div id="galleryContainer">

    <div class="empty">
      <div class="empty-icon">📁</div>
      <h3>Select class and month to load files</h3>
    </div>

  </div>

</div>

<script>

window.onload = () => {

  let schoolName = localStorage.getItem("school_name") || "School";

  document.getElementById("schoolName").innerText = schoolName;

  document.getElementById("schoolTag").innerText = schoolName;

  document.getElementById("avatarLetter").innerText =
  schoolName.charAt(0).toUpperCase();

}

async function loadGallery(){

  let school_id = localStorage.getItem("school_id");

  let class_name =
  document.getElementById("classSelect").value;

  let month =
  document.getElementById("monthSelect").value;

  let res = await fetch(
  `https://school-lms-production-6fcd.up.railway.app/get-gallery?school_id=${school_id}&class_name=${class_name}&month=${month}`
  );

  let data = await res.json();

  let container =
  document.getElementById("galleryContainer");

  if(data.length === 0){

    container.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📂</div>
        <h3>No files found</h3>
      </div>
    `;

    return;
  }

  let html = `<div class="gallery-grid">`;

  data.forEach(item => {

    let preview = "";

    if(item.file_type === "image"){

      preview = `
      <img src="https://school-lms-production-6fcd.up.railway.app/${item.file_path}">
      `;
    }

    else if(item.file_type === "video"){

      preview = `
      <video controls>
        <source src="https://school-lms-production-6fcd.up.railway.app/${item.file_path}">
      </video>
      `;
    }

    else{

      preview = `
      <div class="file-icon">📄</div>
      `;
    }

    html += `

    <div class="file-card">

      <div class="preview">
        ${preview}
      </div>

      <div class="file-bottom">

        <a class="download-btn"
        href="https://school-lms-production-6fcd.up.railway.app/${item.file_path}"
        target="_blank">

        ⬇ Download File

        </a>

      </div>

    </div>

    `;
  });

  html += `</div>`;

  container.innerHTML = html;

}

function logout(){

  localStorage.clear();

  window.location.href = "/";
}

</script>

</body>
</html>
