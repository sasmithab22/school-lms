<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Results</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f6fb; display: flex; min-height: 100vh; }

.sidebar { width: 260px; background: #0f172a; color: white; height: 100vh; padding: 24px 16px; position: fixed; left: 0; top: 0; display: flex; flex-direction: column; overflow-y: auto; }
.logo { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.portal-label { font-size: 11px; color: #64748b; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 16px; }
.profile { background: #1e293b; padding: 14px; border-radius: 12px; margin-bottom: 20px; }
.profile-name { font-weight: 700; font-size: 15px; color: white; }
.profile-sub  { font-size: 12px; color: #94a3b8; margin-top: 3px; }
.menu { flex: 1; }
.menu a { display: flex; align-items: center; gap: 10px; color: #94a3b8; text-decoration: none; padding: 11px 14px; border-radius: 10px; margin-bottom: 4px; font-size: 14px; font-weight: 500; cursor: pointer; transition: 0.2s; }
.menu a:hover { background: #1e293b; color: white; }
.menu a.active { background: #2563eb; color: white; }
.logout { padding: 11px 14px; color: #ef4444; cursor: pointer; border-radius: 10px; font-size: 14px; display: flex; align-items: center; gap: 10px; margin-top: 8px; }
.logout:hover { background: #1e293b; }

.main { margin-left: 260px; padding: 40px; flex: 1; }
.page-header { margin-bottom: 30px; }
.page-header h1 { font-size: 26px; font-weight: 700; color: #0f172a; }
.page-header p { color: #64748b; font-size: 14px; margin-top: 4px; }

.result-card { background: white; border-radius: 14px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 16px; display: flex; align-items: center; gap: 20px; max-width: 800px; }
.score-circle { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; flex-shrink: 0; }
.score-high   { background: #dcfce7; color: #16a34a; }
.score-mid    { background: #fef3c7; color: #d97706; }
.score-low    { background: #fee2e2; color: #ef4444; }

.result-info { flex: 1; }
.result-title   { font-size: 16px; font-weight: 700; color: #0f172a; }
.result-subject { font-size: 13px; color: #64748b; margin-top: 3px; }
.result-date    { font-size: 12px; color: #94a3b8; margin-top: 4px; }

.result-badge { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; }
.badge-high { background: #dcfce7; color: #16a34a; }
.badge-mid  { background: #fef3c7; color: #d97706; }
.badge-low  { background: #fee2e2; color: #ef4444; }

.empty-state { text-align: center; padding: 80px 20px; color: #94a3b8; }
.empty-state div { font-size: 60px; margin-bottom: 16px; }
.empty-state p { font-size: 16px; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">🎓 RTLMS</div>
  <div class="portal-label">Student Portal</div>
  <div class="profile">
    <div class="profile-name" id="studentName">Student</div>
    <div class="profile-sub"  id="studentInfo">Class -</div>
  </div>
  <div class="menu">
    <a href="student-dashboard.html">🏠 My Dashboard</a>
    <a href="student-dashboard.html">🎬 Video Lectures</a>
    <a href="library.html">📚 Library</a>
    <a href="class-gallery.html">🖼 Class Gallery</a>
    <a href="tests.html">📝 Take Tests</a>
    <a class="active" href="results.html">🏆 My Results</a>
  </div>
  <div class="logout" onclick="logout()">🚪 Logout</div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="page-header">
    <h1>🏆 My Test Results</h1>
    <p id="resultCount">0 tests completed</p>
  </div>

  <div id="resultsContainer"></div>
</div>

<script>
let student = JSON.parse(localStorage.getItem("student"));
if (!student) { window.location.href = "login.html"; }

document.getElementById("studentName").innerText = student.name;
document.getElementById("studentInfo").innerText = "Class " + parseInt(student.class) + " • ID #" + student.student_id;

async function loadResults() {
  try {
    let res  = await fetch(`http://127.0.0.1:8000/get-results?student_id=${student.student_id}&school_id=${student.school_id}`);
    let data = await res.json();

    let container = document.getElementById("resultsContainer");
    document.getElementById("resultCount").innerText = data.length + " tests completed";

    if (!data || data.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div>🏆</div>
          <p>No test results yet. Take a test to see your scores.</p>
        </div>`;
      return;
    }

    container.innerHTML = "";
    data.forEach(r => {
      let pct   = Math.round((r.score / r.total) * 100);
      let level = pct >= 80 ? "high" : pct >= 50 ? "mid" : "low";
      let emoji = pct >= 80 ? "🎉" : pct >= 50 ? "👍" : "📚";
      let msg   = pct >= 80 ? "Excellent" : pct >= 50 ? "Good" : "Need Improvement";

      let date = new Date(r.submitted_at).toLocaleDateString("en-IN", { day:"numeric", month:"short", year:"numeric" });

      container.innerHTML += `
      <div class="result-card">
        <div class="score-circle score-${level}">${emoji}<br>${pct}%</div>
        <div class="result-info">
          <div class="result-title">${r.title}</div>
          <div class="result-subject">${r.subject}</div>
          <div class="result-date">📅 ${date}</div>
        </div>
        <div>
          <div style="font-size:20px;font-weight:700;color:#0f172a;text-align:center;">${r.score}/${r.total}</div>
          <div class="result-badge badge-${level}" style="margin-top:6px;">${msg}</div>
        </div>
      </div>`;
    });

  } catch(err) {
    document.getElementById("resultsContainer").innerHTML = `<p style="color:red;">Error loading results ❌</p>`;
  }
}

function logout() { localStorage.clear(); window.location.href = "login.html"; }

loadResults();
</script>
</body>
</html>
