<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Take Tests</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f6fb; display: flex; min-height: 100vh; }

.sidebar { width: 260px; background: #0f172a; color: white; height: 100vh; padding: 24px 16px; position: fixed; left: 0; top: 0; display: flex; flex-direction: column; overflow-y: auto; }
.logo { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.portal-label { font-size: 11px; color: #64748b; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 16px; }
.profile { background: #1e293b; padding: 14px; border-radius: 12px; margin-bottom: 20px; }
.profile-name { font-weight: 700; font-size: 15px; color: white; }
.profile-sub  { font-size: 12px; color: #94a3b8; margin-top: 3px; }
.menu { flex: 1; }
.menu a { display: flex; align-items: center; gap: 10px; color: #94a3b8; text-decoration: none; padding: 11px 14px; border-radius: 10px; margin-bottom: 4px; font-size: 14px; font-weight: 500; cursor: pointer; transition: 0.2s; }
.menu a:hover { background: #1e293b; color: white; }
.menu a.active { background: #2563eb; color: white; }
.logout { padding: 11px 14px; color: #ef4444; cursor: pointer; border-radius: 10px; font-size: 14px; display: flex; align-items: center; gap: 10px; margin-top: 8px; }
.logout:hover { background: #1e293b; }

.main { margin-left: 260px; padding: 40px; flex: 1; }
.page-header { margin-bottom: 30px; }
.page-header h1 { font-size: 26px; font-weight: 700; color: #0f172a; }
.page-header p { color: #64748b; font-size: 14px; margin-top: 4px; }

/* TEST LIST */
.test-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
.test-card { background: white; border-radius: 14px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); transition: 0.2s; }
.test-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
.test-subject { display: inline-block; background: #eff6ff; color: #2563eb; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; margin-bottom: 10px; }
.test-title { font-size: 16px; font-weight: 700; color: #0f172a; margin-bottom: 6px; }
.test-meta { font-size: 13px; color: #64748b; margin-bottom: 16px; }
.start-btn { width: 100%; padding: 11px; background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; transition: 0.2s; }
.start-btn:hover { opacity: 0.9; }

/* TEST TAKING */
#testSection { display: none; max-width: 800px; }
.test-header { background: white; border-radius: 14px; padding: 20px 24px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); display: flex; justify-content: space-between; align-items: center; }
.test-header h2 { font-size: 18px; font-weight: 700; color: #0f172a; }
.timer { background: #fef3c7; color: #d97706; padding: 8px 16px; border-radius: 10px; font-weight: 700; font-size: 16px; }

.question-block { background: white; border-radius: 14px; padding: 24px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.q-number { font-size: 13px; color: #64748b; font-weight: 600; margin-bottom: 8px; }
.q-text { font-size: 16px; font-weight: 600; color: #0f172a; margin-bottom: 16px; }

.option { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border: 1.5px solid #e2e8f0; border-radius: 10px; margin-bottom: 8px; cursor: pointer; transition: 0.2s; }
.option:hover { border-color: #2563eb; background: #eff6ff; }
.option input[type="radio"] { width: 18px; height: 18px; accent-color: #2563eb; }
.option label { cursor: pointer; font-size: 15px; color: #374151; }
.option.selected { border-color: #2563eb; background: #eff6ff; }

.submit-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; box-shadow: 0 4px 12px rgba(37,99,235,0.3); transition: 0.2s; margin-top: 8px; }

/* RESULT POPUP */
.result-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
.result-overlay.show { display: flex; }
.result-box { background: white; border-radius: 20px; padding: 40px; text-align: center; max-width: 400px; width: 90%; }
.result-emoji { font-size: 60px; margin-bottom: 16px; }
.result-score { font-size: 48px; font-weight: 700; color: #2563eb; }
.result-total { font-size: 18px; color: #64748b; margin-bottom: 20px; }
.result-msg { font-size: 16px; color: #374151; margin-bottom: 24px; }
.result-back { padding: 12px 28px; background: #2563eb; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }

.empty-state { text-align: center; padding: 60px 20px; color: #94a3b8; }
.empty-state div { font-size: 48px; margin-bottom: 16px; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">🎓 RTLMS</div>
  <div class="portal-label">Student Portal</div>
  <div class="profile">
    <div class="profile-name" id="studentName">Student</div>
    <div class="profile-sub"  id="studentInfo">Class -</div>
  </div>
  <div class="menu">
    <a href="student-dashboard.html">🏠 My Dashboard</a>
    <a href="student-dashboard.html">🎬 Video Lectures</a>
    <a href="library.html">📚 Library</a>
    <a href="class-gallery.html">🖼 Class Gallery</a>
    <a class="active" href="tests.html">📝 Take Tests</a>
    <a href="results.html">🏆 My Results</a>
  </div>
  <div class="logout" onclick="logout()">🚪 Logout</div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- TEST LIST -->
  <div id="listSection">
    <div class="page-header">
      <h1>📝 Take Tests</h1>
      <p>Tests created by your teachers</p>
    </div>
    <div id="testGrid" class="test-grid"><p style="color:#94a3b8;">Loading tests...</p></div>
  </div>

  <!-- TEST TAKING -->
  <div id="testSection">
    <div class="test-header">
      <h2 id="testTitle">Test</h2>
      <div class="timer" id="timer">⏱ 30:00</div>
    </div>
    <div id="questionsDiv"></div>
    <button class="submit-btn" onclick="submitTest()">Submit Test →</button>
  </div>

</div>

<!-- RESULT POPUP -->
<div class="result-overlay" id="resultOverlay">
  <div class="result-box">
    <div class="result-emoji" id="resultEmoji">🎉</div>
    <div class="result-score" id="resultScore">0</div>
    <div class="result-total" id="resultTotal">out of 0</div>
    <div class="result-msg"  id="resultMsg">Good job!</div>
    <button class="result-back" onclick="backToList()">Back to Tests</button>
  </div>
</div>

<script>
let student = JSON.parse(localStorage.getItem("student"));
if (!student) { window.location.href = "/"; }

document.getElementById("studentName").innerText = student.name;
document.getElementById("studentInfo").innerText = "Class " + parseInt(student.class) + " • ID #" + student.student_id;

let currentTest = null;
let currentQuestions = [];
let timerInterval = null;
let timeLeft = 0;

// LOAD TESTS
async function loadTests() {
  try {
    let res  = await fetch(`https://school-lms-production-6fcd.up.railway.app/get-tests?school_id=${student.school_id}&class_name=${student.class}`);
    let data = await res.json();

    let grid = document.getElementById("testGrid");

    if (!data || data.length === 0) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div>📝</div><p>No tests available yet</p></div>`;
      return;
    }

    grid.innerHTML = "";
    data.forEach(t => {
      grid.innerHTML += `
      <div class="test-card">
        <span class="test-subject">${t.subject}</span>
        <div class="test-title">${t.title}</div>
        <div class="test-meta">⏱ ${t.duration} mins • Class ${t.class_name}</div>
        <button class="start-btn" onclick="startTest(${t.id}, '${t.title}', ${t.duration})">Start Test →</button>
      </div>`;
    });
  } catch(err) {
    document.getElementById("testGrid").innerHTML = `<p style="color:red;">Error loading ❌</p>`;
  }
}

// START TEST
async function startTest(testId, title, duration) {
  try {
    let res  = await fetch(`https://school-lms-production-6fcd.up.railway.app/get-test-questions?test_id=${testId}`);
    let questions = await res.json();

    currentTest      = testId;
    currentQuestions = questions;

    document.getElementById("testTitle").innerText = title;
    document.getElementById("listSection").style.display = "none";
    document.getElementById("testSection").style.display = "block";

    let qDiv = document.getElementById("questionsDiv");
    qDiv.innerHTML = "";

    questions.forEach((q, i) => {
      qDiv.innerHTML += `
      <div class="question-block">
        <div class="q-number">Question ${i + 1}</div>
        <div class="q-text">${q.question}</div>
        ${["A","B","C","D"].map(opt => `
          <div class="option" id="opt_${q.id}_${opt}" onclick="selectOption(${q.id}, '${opt}')">
            <input type="radio" name="q_${q.id}" id="r_${q.id}_${opt}" value="${opt}">
            <label for="r_${q.id}_${opt}"><b>${opt}.</b> ${q["option_" + opt.toLowerCase()]}</label>
          </div>`).join("")}
      </div>`;
    });

    // Timer
    timeLeft = duration * 60;
    startTimer();

  } catch(err) {
    alert("Error loading questions ❌");
  }
}

function selectOption(qId, opt) {
  ["A","B","C","D"].forEach(o => {
    document.getElementById("opt_" + qId + "_" + o)?.classList.remove("selected");
  });
  document.getElementById("opt_" + qId + "_" + opt)?.classList.add("selected");
  document.getElementById("r_" + qId + "_" + opt).checked = true;
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    let m = Math.floor(timeLeft / 60).toString().padStart(2, "0");
    let s = (timeLeft % 60).toString().padStart(2, "0");
    document.getElementById("timer").innerText = `⏱ ${m}:${s}`;
    if (timeLeft <= 0) { clearInterval(timerInterval); submitTest(); }
  }, 1000);
}

async function submitTest() {
  clearInterval(timerInterval);

  let score = 0;
  currentQuestions.forEach(q => {
    let selected = document.querySelector(`input[name="q_${q.id}"]:checked`);
    if (selected && selected.value === q.correct_answer) score++;
  });

  let total = currentQuestions.length;

  try {
    await fetch("https://school-lms-production-6fcd.up.railway.app/submit-test", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        test_id    : currentTest,
        student_id : student.student_id,
        school_id  : student.school_id,
        score      : score,
        total      : total
      })
    });
  } catch(err) { console.log(err); }

  // Show result
  let pct = Math.round((score / total) * 100);
  document.getElementById("resultScore").innerText = score;
  document.getElementById("resultTotal").innerText = "out of " + total + " (" + pct + "%)";
  document.getElementById("resultEmoji").innerText = pct >= 80 ? "🎉" : pct >= 50 ? "👍" : "📚";
  document.getElementById("resultMsg").innerText   = pct >= 80 ? "Excellent work!" : pct >= 50 ? "Good effort!" : "Keep studying!";
  document.getElementById("resultOverlay").classList.add("show");
}

function backToList() {
  document.getElementById("resultOverlay").classList.remove("show");
  document.getElementById("testSection").style.display  = "none";
  document.getElementById("listSection").style.display  = "block";
  loadTests();
}

function logout() { localStorage.clear(); window.location.href = "/"; }

loadTests();
</script>
</body>
</html>
