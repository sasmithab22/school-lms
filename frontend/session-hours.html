<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Session Hours</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: #f4f6fb;
  display: flex;
  min-height: 100vh;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 260px;
  background: #0f172a;
  color: white;
  height: 100vh;
  padding: 24px 16px;
  position: fixed;
  left: 0; top: 0;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}

.logo {
  font-size: 22px;
  font-weight: 700;
  color: white;
  padding: 0 10px;
  margin-bottom: 4px;
}

.portal-label {
  font-size: 11px;
  color: #64748b;
  padding: 0 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.staff-card {
  background: #1e293b;
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.staff-avatar {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 16px;
  flex-shrink: 0;
}

.staff-info .staff-name {
  font-size: 14px;
  font-weight: 600;
  color: white;
}

.staff-info .staff-sub {
  font-size: 12px;
  color: #94a3b8;
  margin-top: 2px;
}

.school-tag {
  background: #1e293b;
  border-radius: 10px;
  padding: 9px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 20px;
}

.school-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #22c55e;
  flex-shrink: 0;
}

.school-tag-name {
  font-size: 13px;
  color: #cbd5e1;
  font-weight: 500;
}

.menu { flex: 1; }

.menu a {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 14px;
  margin-bottom: 4px;
  color: #94a3b8;
  text-decoration: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  transition: 0.2s;
}

.menu a:hover { background: #1e293b; color: white; }
.menu a.active { background: #2563eb; color: white; }

.logout {
  padding: 11px 14px;
  color: #ef4444;
  cursor: pointer;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 8px;
  transition: 0.2s;
}

.logout:hover { background: #1e293b; }

/* ── MAIN ── */
.main {
  margin-left: 260px;
  padding: 40px;
  flex: 1;
}

.page-header { margin-bottom: 30px; }

.page-header h1 {
  font-size: 26px;
  font-weight: 700;
  color: #0f172a;
}

.page-header p {
  color: #64748b;
  font-size: 14px;
  margin-top: 4px;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 28px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.06);
  margin-bottom: 24px;
  max-width: 600px;
}

.card h3 {
  font-size: 16px;
  font-weight: 700;
  color: #0f172a;
  margin-bottom: 20px;
}

.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 16px;
}

label {
  font-size: 13px;
  font-weight: 600;
  color: #374151;
}

input, select {
  padding: 11px 14px;
  border: 1.5px solid #e2e8f0;
  border-radius: 10px;
  font-size: 14px;
  font-family: inherit;
  background: #f8fafc;
  color: #0f172a;
  outline: none;
  transition: 0.2s;
  width: 100%;
}

input:focus, select:focus {
  border-color: #2563eb;
  background: white;
  box-shadow: 0 0 0 3px rgba(37,99,235,0.08);
}

.log-btn {
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg, #2563eb, #1d4ed8);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  box-shadow: 0 4px 12px rgba(37,99,235,0.3);
  transition: 0.2s;
  margin-top: 8px;
}

.log-btn:hover { transform: translateY(-1px); }

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <div class="logo">RTLMS</div>
  <div class="portal-label">Staff Portal</div>

  <div class="staff-card">
    <div class="staff-avatar" id="avatarLetter">S</div>
    <div class="staff-info">
      <div class="staff-name" id="staffNameDisplay">Staff</div>
      <div class="staff-sub"  id="staffIdDisplay">ID: -</div>
    </div>
  </div>

  <div class="school-tag">
    <div class="school-dot"></div>
    <div class="school-tag-name" id="schoolTagName">Loading...</div>
  </div>

  <div class="menu">
    <a href="staff-dashboard.html">🏠 Dashboard</a>
    <a href="submit-reports.html">📋 Submit Reports</a>
    <a class="active" href="session-hours.html">⏱ Session Hours</a>
    <a href="upload-lectures.html">🎬 Upload Lectures</a>
    <a href="upload-books.html">📚 Upload Books</a>
    <a href="create-tests.html">📝 Create Tests</a>
    <a href="staff-class-gallery.html">📷 Class Gallery</a>
    <a href="staff-profile.html">👤 My Profile</a>
  </div>

  <div class="logout" onclick="logout()">🚪 Logout</div>

</div>

<!-- MAIN -->
<div class="main">

  <div class="page-header">
    <h1>Session Hours Log</h1>
    <p>Record your teaching sessions for the month</p>
  </div>

  <div class="card">
    <h3>⏱ Log a Session</h3>

    <div class="field">
      <label>Month</label>
      <select id="month">
        <option value="January">January</option>
        <option value="February">February</option>
        <option value="March">March</option>
        <option value="April">April</option>
        <option value="May">May</option>
        <option value="June">June</option>
        <option value="July">July</option>
        <option value="August">August</option>
        <option value="September">September</option>
        <option value="October">October</option>
        <option value="November">November</option>
        <option value="December">December</option>
      </select>
    </div>

    <div class="field">
      <label>Session Date</label>
      <input type="date" id="date">
    </div>

    <div class="field">
      <label>Hours Conducted</label>
      <input type="number" id="hours" placeholder="e.g. 2" min="1" max="12">
    </div>

    <div class="field">
      <label>Session Topic</label>
      <input type="text" id="topic" placeholder="e.g. Introduction to Algebra">
    </div>

    <button class="log-btn" onclick="logSession()">Log Session →</button>

  </div>

</div>

<script>

window.onload = () => {

  let school_id   = localStorage.getItem("school_id");
  let school_name = localStorage.getItem("school_name");
  let staff_id    = localStorage.getItem("staff_id");

  if (!school_id) {
    alert("Login expired ❌");
    window.location.href = "login.html";
    return;
  }

  let displayName = school_name || "School";

  // Sidebar
  document.getElementById("avatarLetter").innerText     = displayName.charAt(0).toUpperCase();
  document.getElementById("staffNameDisplay").innerText = displayName;
  document.getElementById("staffIdDisplay").innerText   = "Staff ID : " + (staff_id || "-");
  document.getElementById("schoolTagName").innerText    = displayName;

}

async function logSession() {

  let staff_id  = localStorage.getItem("staff_id");
  let school_id = localStorage.getItem("school_id");

  let month = document.getElementById("month").value;
  let date  = document.getElementById("date").value;
  let hours = document.getElementById("hours").value;
  let topic = document.getElementById("topic").value.trim();

  if (!date)  { alert("Date select பண்ணுங்க ❌"); return; }
  if (!hours) { alert("Hours enter பண்ணுங்க ❌"); return; }
  if (!topic) { alert("Topic enter பண்ணுங்க ❌"); return; }

  try {

    let res  = await fetch("https://school-lms-production-6fcd.up.railway.app/log-session", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        staff_id  : staff_id,
        school_id : school_id,
        month     : month,
        date      : date,
        hours     : hours,
        topic     : topic
      })
    });

    let data = await res.json();
    alert("✅ " + data.message);

    // Reset form
    document.getElementById("date").value  = "";
    document.getElementById("hours").value = "";
    document.getElementById("topic").value = "";

  } catch(err) {
    console.log(err);
    alert("Server error ");
  }

}

function logout() {
  localStorage.clear();
  window.location.href = "login.html";
}

</script>

</body>
</html>
