<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Students</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: #f4f6fb;
  display: flex;
  min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: #0f172a;
  color: white;
  height: 100vh;
  padding: 24px 16px;
  position: fixed;
  left: 0; top: 0;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}

.logo { font-size: 22px; font-weight: 700; padding: 0 10px; margin-bottom: 4px; }
.portal-label { font-size: 11px; color: #64748b; padding: 0 10px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 16px; }

.school-card {
  background: #1e293b; border-radius: 12px; padding: 12px 14px;
  margin-bottom: 12px; display: flex; align-items: center; gap: 10px;
}
.school-avatar {
  width: 38px; height: 38px; border-radius: 50%;
  background: linear-gradient(135deg, #2563eb, #4f46e5);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 16px; flex-shrink: 0;
}
.school-info .school-name { font-size: 14px; font-weight: 600; color: white; }
.school-info .school-sub  { font-size: 12px; color: #94a3b8; margin-top: 2px; }

.school-tag {
  background: #1e293b; border-radius: 10px; padding: 9px 14px;
  display: flex; align-items: center; gap: 8px; margin-bottom: 20px;
}
.school-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
.school-tag-name { font-size: 13px; color: #cbd5e1; font-weight: 500; }

.menu { flex: 1; }
.menu a {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 14px; margin-bottom: 4px;
  color: #94a3b8; text-decoration: none;
  border-radius: 10px; font-size: 14px; font-weight: 500; transition: 0.2s;
}
.menu a:hover { background: #1e293b; color: white; }
.menu a.active { background: #2563eb; color: white; }

.logout {
  padding: 11px 14px; color: #ef4444; cursor: pointer;
  border-radius: 10px; font-size: 14px; font-weight: 500;
  display: flex; align-items: center; gap: 10px;
  margin-top: 8px; transition: 0.2s;
}
.logout:hover { background: #1e293b; }

/* MAIN */
.main { margin-left: 260px; padding: 40px; flex: 1; }

.page-header { margin-bottom: 24px; }
.page-header h1 { font-size: 26px; font-weight: 700; color: #0f172a; }
.page-header p  { color: #64748b; font-size: 14px; margin-top: 4px; }

/* SEARCH BAR */
.search-bar {
  background: white;
  border-radius: 14px;
  padding: 16px 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.search-bar input {
  flex: 1;
  padding: 10px 14px;
  border: 1.5px solid #e2e8f0;
  border-radius: 10px;
  font-size: 14px;
  font-family: inherit;
  outline: none;
  background: #f8fafc;
}

.search-bar input:focus { border-color: #2563eb; background: white; }

.count-badge {
  background: #eff6ff;
  color: #2563eb;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
}

/* TABLE CARD */
.table-card {
  background: white;
  border-radius: 14px;
  padding: 24px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  overflow-x: auto;
}

table { width: 100%; border-collapse: collapse; }

thead tr { border-bottom: 2px solid #f0f0f0; }

th {
  padding: 12px 16px;
  font-size: 12px;
  font-weight: 700;
  color: #64748b;
  text-align: left;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

td {
  padding: 14px 16px;
  border-bottom: 1px solid #f8fafc;
  font-size: 14px;
  color: #374151;
}

tbody tr:hover { background: #f8fafc; }
tbody tr:last-child td { border-bottom: none; }

.id-badge {
  background: #f1f5f9;
  color: #475569;
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
}

.class-badge {
  background: #eff6ff;
  color: #2563eb;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}

.section-badge {
  background: #f0fdf4;
  color: #16a34a;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">RTLMS</div>
  <div class="portal-label">School Portal</div>

  <div class="school-card">
    <div class="school-avatar" id="avatarLetter">S</div>
    <div class="school-info">
      <div class="school-name" id="sidebarSchoolName">School</div>
      <div class="school-sub">School Admin</div>
    </div>
  </div>

  <div class="school-tag">
    <div class="school-dot"></div>
    <div class="school-tag-name" id="sidebarSchoolTag">Loading...</div>
  </div>

  <div class="menu">
    <a href="school-dashboard.html">⚡ Overview</a>
    <a class="active" href="students.html">🎓 Students</a>
    <a href="upload-students.html">📤 Upload Students</a>
    <a href="class-reports.html">📊 Class Reports</a>
    <a href="class-gallery.html">📷 Class Gallery</a>
    <a href="session-attendance.html">⏱ Session Attendance</a>
    
    <a href="my-profile.html">👤 My Profile</a>
  </div>

  <div class="logout" onclick="logout()">🚪 Sign Out</div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="page-header">
    <h1>Student Directory</h1>
    <p>All students enrolled in your school</p>
  </div>

  <!-- SEARCH -->
  <div class="search-bar">
    <input id="searchInput" placeholder="🔍 Search by name or ID..." onkeyup="searchStudents()">
    <div class="count-badge" id="studentCount">0 students</div>
  </div>

  <!-- TABLE -->
  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Class</th>
          <th>Section</th>
        </tr>
      </thead>
      <tbody id="studentsTable">
        <tr><td colspan="4" style="text-align:center;color:#94a3b8;padding:30px;">Loading students...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>

let schoolName = localStorage.getItem("school_name");
let schoolId   = localStorage.getItem("school_id");

if (!schoolId) { window.location.href = "/"; }

let name = schoolName || "School";
document.getElementById("avatarLetter").innerText      = name.charAt(0).toUpperCase();
document.getElementById("sidebarSchoolName").innerText = name;
document.getElementById("sidebarSchoolTag").innerText  = name;

async function loadStudents() {
  try {
    let res  = await fetch(`https://school-lms-production-6fcd.up.railway.app/all-students?school_id=${schoolId}`);
    let data = await res.json();

    let students = data.students || [];
    let table    = document.getElementById("studentsTable");
    let count    = document.getElementById("studentCount");

    count.innerText = students.length + " students";
    table.innerHTML = "";

    if (students.length === 0) {
      table.innerHTML = `<tr><td colspan="4" style="text-align:center;color:#94a3b8;padding:30px;">No students enrolled yet</td></tr>`;
      return;
    }

    students.forEach(s => {
      let first     = s.first_name || "";
      let last      = s.last_name  || "";
      let className = s.class || s.class_name || "";
      let section   = s.section || "-";

      table.innerHTML += `
      <tr>
        <td><span class="id-badge">#${s.id}</span></td>
        <td>${first} ${last}</td>
        <td><span class="class-badge">${className}</span></td>
        <td><span class="section-badge">${section}</span></td>
      </tr>`;
    });

  } catch(err) {
    console.log("Error:", err);
  }
}

function searchStudents() {
  let input = document.getElementById("searchInput").value.toLowerCase();
  let rows  = document.getElementById("studentsTable").getElementsByTagName("tr");
  for (let i = 0; i < rows.length; i++) {
    rows[i].style.display = rows[i].innerText.toLowerCase().includes(input) ? "" : "none";
  }
}

function logout() { localStorage.clear(); window.location.href = "/"; }

loadStudents();
</script>

</body>
</html>
