<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Library</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: #f4f6fb;
  display: flex;
  min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: #0f172a;
  color: white;
  height: 100vh;
  padding: 20px 16px;
  position: fixed;
  left: 0; top: 0;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}

.logo { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.portal-label { font-size: 11px; color: #64748b; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 16px; }

.profile-card {
  background: #1e293b; border-radius: 12px; padding: 14px;
  margin-bottom: 20px;
}
.profile-name { font-size: 15px; font-weight: 700; color: white; }
.profile-sub  { font-size: 12px; color: #94a3b8; margin-top: 3px; }

.menu { flex: 1; }
.menu a { display: flex; align-items: center; gap: 10px; padding: 11px 14px; margin-bottom: 4px; color: #94a3b8; text-decoration: none; border-radius: 10px; font-size: 14px; font-weight: 500; transition: 0.2s; cursor: pointer; }
.menu a:hover { background: #1e293b; color: white; }
.menu a.active { background: #2563eb; color: white; }

.logout { padding: 11px 14px; color: #ef4444; cursor: pointer; border-radius: 10px; font-size: 14px; display: flex; align-items: center; gap: 10px; margin-top: 8px; }
.logout:hover { background: #1e293b; }

/* MAIN */
.main { margin-left: 260px; padding: 40px; flex: 1; }

.page-header { margin-bottom: 30px; }
.page-header h1 { font-size: 26px; font-weight: 700; color: #0f172a; }
.page-header p { color: #64748b; font-size: 14px; margin-top: 4px; }

/* BOOKS GRID */
.books-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
}

.book-card {
  background: white;
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  display: flex;
  flex-direction: column;
  gap: 12px;
  transition: 0.2s;
}

.book-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.1);
}

.book-icon { font-size: 40px; }

.book-subject {
  display: inline-block;
  background: #eff6ff;
  color: #2563eb;
  font-size: 12px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 20px;
}

.book-title {
  font-size: 16px;
  font-weight: 700;
  color: #0f172a;
}

.book-author {
  font-size: 13px;
  color: #64748b;
}

.read-btn {
  margin-top: auto;
  padding: 10px;
  background: linear-gradient(135deg, #2563eb, #1d4ed8);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  text-align: center;
  text-decoration: none;
  display: block;
  transition: 0.2s;
}

.read-btn:hover { opacity: 0.9; }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: #94a3b8;
}

.empty-state div { font-size: 48px; margin-bottom: 16px; }
.empty-state p { font-size: 16px; }
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">🎓 RTLMS</div>
  <div class="portal-label">Student Portal</div>

  <div class="profile-card">
    <div class="profile-name" id="studentName">Student</div>
    <div class="profile-sub"  id="studentInfo">Class -</div>
  </div>

  <div class="menu">
    <a href="student-dashboard.html">🏠 My Dashboard</a>
    <a href="student-dashboard.html">🎬 Video Lectures</a>
    <a class="active" href="library.html">📚 Library</a>
    <a href="student-gallery.html">🖼 Class Gallery</a>
    <a href="tests.html">📝 Take Tests</a>
    <a href="results.html">🏆 My Results</a>
  </div>

  <div class="logout" onclick="logout()">🚪 Logout</div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="page-header">
    <h1>📚 Library</h1>
    <p>Study materials and books uploaded by your teachers</p>
  </div>

  <div id="booksContainer" class="books-grid">
    <p style="color:#94a3b8;">Loading books...</p>
  </div>
</div>

<script>

window.onload = async () => {

  let student = JSON.parse(localStorage.getItem("student"));

  if (!student) {
    window.location.href = "/";
    return;
  }

  document.getElementById("studentName").innerText = student.name;
  document.getElementById("studentInfo").innerText = "Class " + parseInt(student.class) + " • ID #" + student.student_id;

  await loadBooks(student.school_id, student.class);
}

async function loadBooks(school_id, class_name) {

  class_name = parseInt(class_name);

  try {
    let res  = await fetch(`https://school-lms-production-6fcd.up.railway.app/get-books?school_id=${school_id}&class_name=${class_name}`);
    let data = await res.json();

    let container = document.getElementById("booksContainer");

    if (!data || data.length === 0) {
      container.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1;">
          <div>📚</div>
          <p>No books uploaded yet</p>
        </div>`;
      return;
    }

    container.innerHTML = "";

    data.forEach(book => {
      container.innerHTML += `
      <div class="book-card">
        <div class="book-icon">📗</div>
        <span class="book-subject">${book.subject}</span>
        <div class="book-title">${book.title}</div>
        <div class="book-author">${book.author ? "✍ " + book.author : ""}</div>
        <a class="read-btn" href="https://school-lms-production-6fcd.up.railway.app/${book.file_path}" target="_blank">
          📖 Read / Download
        </a>
      </div>`;
    });

  } catch(err) {
    console.log(err);
    document.getElementById("booksContainer").innerHTML = `<p style="color:red;">Error loading books ❌</p>`;
  }
}

function logout() {
  localStorage.clear();
  window.location.href = "/";
}
</script>

</body>
</html>
